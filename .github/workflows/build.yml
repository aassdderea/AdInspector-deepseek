name: Build AdInspector Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install ldid
      run: brew install ldid

    - name: Clone Theos
      run: |
        export THEOS=/opt/theos
        sudo mkdir -p $THEOS
        sudo chown -R $USER:staff $THEOS
        git clone --recursive https://github.com/theos/theos.git $THEOS

    - name: Build dylib
      run: |
        export THEOS=/opt/theos
        # 确保环境变量与 Makefile 一致
        export SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
        export PREFIX=$SDKROOT/usr/
        make clean
        make

    - name: Verify output
      run: |
        ls -lh AdInspector.dylib || (cp .theos/obj/AdInspector.dylib . 2>/dev/null || cp .theos/obj/*/AdInspector.dylib .)
        file AdInspector.dylib

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AdInspector.dylib
        path: AdInspector.dylib
